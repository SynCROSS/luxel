<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Luxel</title>
    <style>
      button {
        font: inherit;
        min-width: 44px;
        min-height: 44px;
      }
    </style>
  </head>
  <body>
    <main data-luxel-route="/">
      <h1>Hello Luxel</h1>
      <!-- luxel:boundary-start id="boundary:0" directive="load" -->
      <section><button type="button" data-luxel-text="count">0</button></section>
      <!-- luxel:boundary-end id="boundary:0" -->
    </main>

    <script type="application/json" id="luxel-data">
      {"version":2,"resources":{"route:index:message":{"value":{"message":"Hello Luxel"},"generation":0,"tags":["home"],"cache":{},"stale":false}}}
    </script>
    <script type="application/json" id="luxel-hydration">
      {"routeId":"route:index","bindings":[{"templateId":"message","resourceKey":"route:index:message","field":"message"}],"boundaries":[{"id":"boundary:0","directive":"load","clientModule":"client/routes/index.js"}]}
    </script>
    <script type="module" src="/assets/client.dev0.js"></script>
  </body>
</html>
